name: Build and Release macOS Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Build macOS Installer Package
        run: |
          cd packaging
          chmod +x build_pkg.sh
          ./build_pkg.sh
      
      - name: Upload PKG to Release
        uses: softprops/action-gh-release@v1
        with:
          files: packaging/build/DigTechTouchscreenDriver-*.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
